# Netlify deploy config — Quickufficio Astro 6
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # @astrojs/netlify produce static (dist/) + Netlify Functions (.netlify/v1/functions/ssr)
  command = "pnpm build"
  publish = "dist"

[build.environment]
  # Node 22+ richiesto da pnpm 11 (usa node:sqlite built-in disponibile da v22.13)
  NODE_VERSION = "22"
  # pnpm version: presa da packageManager field di package.json

# Static assets — cache aggressivo (1 anno) per file con hash nel nome
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — no-cache di default per garantire freshness dei contenuti
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Redirects vecchi slug BIC: gestiti via astro.config.mjs → _redirects auto-generato
