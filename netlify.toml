# Netlify deploy config — Quickufficio Astro 6
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build pipeline npm — affidabile, niente strict checks come pnpm 11
  # 1. npm install gestito da Netlify auto-install (legge package-lock.json)
  # 2. npm run build → astro build → 40 statiche + Functions bundle
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Static assets — cache aggressivo (1 anno) per file con hash nel nome
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — no-cache di default per garantire freshness dei contenuti
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Redirects vecchi slug BIC: gestiti via astro.config.mjs → _redirects auto-generato
